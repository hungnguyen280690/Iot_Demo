apiVersion: apps/v1 # Kubernetes API version for Deployment
kind: Deployment # Type of Kubernetes resource
metadata:
  name: client-service # Name of the Deployment
  labels: # Labels for identifying the Deployment
    app: iot-project # Label for the IoT project
spec:
  replicas: 2  # High Availability
  selector: # Selector to match the Pods created by this Deployment
    matchLabels: # Labels to identify the Pods
      app: client-service # Label for the client service
  template: # Template for the Pods created by this Deployment
    metadata: # Metadata for the Pods
      labels: # Labels for identifying the Pods
        app: client-servicec # Label for the client service
    spec: # Specification for the Pods`
      containers: # Container definitions
      - name: main # Name of the container
        image: hung/client-service:v1.0 # Docker image to use for the container
        ports:
        - containerPort: 8080
        resources:  # Professional Essential
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:  # Self-healing
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5

---

apiVersion: v1
kind: Service
metadata:
  name: client-service  # This is the DNS name other pods will use
spec:
  selector:
    app: client-service # IMPORTANT: This must match the label in your Deployment
  ports:
    - protocol: TCP
      port: 80          # The port other pods talk to (Internal)
      targetPort: 8080  # The port your Docker container is listening on
  type: ClusterIP       # Internal-only (standard for backend services)